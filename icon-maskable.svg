<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="50%"  stop-color="#c026d3"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <linearGradient id="sunGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
  </defs>

  <!-- Full-bleed background for maskable (no rounded corners) -->
  <rect width="192" height="192" fill="url(#bg)"/>

  <!-- Sun -->
  <circle cx="130" cy="74" r="28" fill="url(#sunGrad)" filter="url(#softShadow)"/>
  <g stroke="#fef08a" stroke-width="4" stroke-linecap="round" opacity="0.9">
    <line x1="130" y1="38" x2="130" y2="30"/>
    <line x1="154" y1="50" x2="160" y2="44"/>
    <line x1="166" y1="74" x2="174" y2="74"/>
    <line x1="154" y1="98" x2="160" y2="104"/>
    <line x1="106" y1="50" x2="100" y2="44"/>
  </g>

  <!-- Cloud -->
  <g filter="url(#softShadow)">
    <circle cx="68"  cy="114" r="20" fill="white"/>
    <circle cx="96"  cy="102" r="30" fill="white"/>
    <circle cx="126" cy="110" r="24" fill="white"/>
    <rect x="48" y="110" width="102" height="32" fill="white"/>
    <rect x="48" y="128" width="102" height="14" rx="7" fill="white"/>
  </g>
</svg>
