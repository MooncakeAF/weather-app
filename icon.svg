<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="50%"  stop-color="#c026d3"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <linearGradient id="sunGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="38" fill="url(#bg)"/>

  <!-- Sun (top-right, partially behind cloud) -->
  <circle cx="130" cy="72" r="30" fill="url(#sunGrad)" filter="url(#softShadow)"/>
  <!-- Sun rays -->
  <g stroke="#fef08a" stroke-width="4" stroke-linecap="round" opacity="0.9">
    <line x1="130" y1="34" x2="130" y2="26"/>
    <line x1="155" y1="47" x2="161" y2="41"/>
    <line x1="168" y1="72" x2="176" y2="72"/>
    <line x1="155" y1="97" x2="161" y2="103"/>
    <line x1="105" y1="47" x2="99"  y2="41"/>
  </g>

  <!-- Cloud (main body — white, sitting centre-left) -->
  <g filter="url(#softShadow)">
    <!-- Small bump left -->
    <circle cx="68"  cy="112" r="20" fill="white"/>
    <!-- Big bump centre -->
    <circle cx="96"  cy="100" r="30" fill="white"/>
    <!-- Medium bump right -->
    <circle cx="126" cy="108" r="24" fill="white"/>
    <!-- Fill base -->
    <rect x="48" y="108" width="102" height="32" rx="0" fill="white"/>
    <!-- Clean bottom edge -->
    <rect x="48" y="126" width="102" height="14" rx="7" fill="white"/>
  </g>
</svg>
