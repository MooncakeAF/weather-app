<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Now</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#7c3aed" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Weather Now" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --glass:        rgba(12, 12, 22, 0.58);
      --glass-border: rgba(255, 255, 255, 0.11);
      --accent:       #6c63ff;
      --accent-glow:  rgba(108, 99, 255, 0.32);
      --primary:      #f0f0f8;
      --secondary:    rgba(210, 210, 235, 0.75);
      --muted:        rgba(180, 180, 215, 0.45);
      --input-bg:     rgba(8, 8, 18, 0.55);
      --stat-bg:      rgba(8, 8, 18, 0.42);
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: var(--primary);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 24px;
      padding: 52px 24px;
      background: #0a0a12;
    }

    body::before {
      content: '';
      position: fixed;
      inset: -24px;
      background: url('weather-background.jpg') center / cover no-repeat;
      filter: blur(16px) brightness(0.75) saturate(1.15);
      z-index: -2;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(155deg,
        rgba(4, 4, 16, 0.60) 0%,
        rgba(8, 8, 28, 0.42) 50%,
        rgba(4, 4, 16, 0.68) 100%);
      z-index: -1;
    }

    .glass {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(22px) saturate(1.5);
      -webkit-backdrop-filter: blur(22px) saturate(1.5);
      box-shadow: 0 8px 40px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04);
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      border-radius: 24px;
      padding: 20px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: sticky;
      top: 52px;
    }

    .sidebar-title {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      padding-bottom: 10px;
      border-bottom: 1px solid var(--glass-border);
    }

    .city-list { display: flex; flex-direction: column; gap: 7px; }

    .city-item { display: flex; align-items: center; gap: 6px; }

    .city-flag-btn {
      flex: 1;
      height: 62px;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      overflow: hidden;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 4px 14px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.22),
        inset 0 -3px 8px rgba(0,0,0,0.3);
      transition: transform 0.13s ease, box-shadow 0.18s ease;
    }

    .city-flag-btn:hover {
      transform: scale(1.035);
      box-shadow:
        0 7px 22px rgba(0,0,0,0.7),
        inset 0 1px 0 rgba(255,255,255,0.22),
        inset 0 -3px 8px rgba(0,0,0,0.3);
    }

    .city-flag-btn:active { transform: scale(0.975); }

    .city-label {
      font-weight: 900;
      color: #fff;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      width: 100%;
      padding: 0 10px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.95), 0 0 24px rgba(0,0,0,0.7);
      pointer-events: none;
    }

    .city-remove {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      background: transparent;
      border: none;
      border-radius: 8px;
      color: var(--muted);
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.18s, background 0.18s;
    }

    .city-remove:hover {
      color: #ff7070;
      background: rgba(255, 70, 70, 0.13);
    }

    .city-empty {
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
      padding: 6px 0;
    }

    .sidebar-divider { height: 1px; background: var(--glass-border); }

    .add-city-row { display: flex; gap: 6px; }

    .add-city-input {
      flex: 1;
      min-width: 0;
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      border-radius: 11px;
      padding: 9px 11px;
      color: var(--primary);
      font-size: 0.84rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      backdrop-filter: blur(12px);
    }

    .add-city-input::placeholder { color: var(--muted); }

    .add-city-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .add-city-btn {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      background: var(--accent);
      border: none;
      border-radius: 11px;
      color: #fff;
      font-size: 1.4rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.18s, box-shadow 0.18s, transform 0.1s;
    }

    .add-city-btn:hover { background: #7a72ff; box-shadow: 0 4px 16px var(--accent-glow); }
    .add-city-btn:active { transform: scale(0.93); }

    /* ── Main ── */
    .main {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      max-width: 620px;
    }

    .app-title {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(225, 225, 245, 0.88);
      text-shadow: 0 2px 14px rgba(0,0,0,0.75);
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .app-title svg { opacity: 0.65; }

    .search-bar { display: flex; gap: 10px; width: 100%; margin-bottom: 24px; }

    .search-input {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 14px 20px;
      color: var(--primary);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      backdrop-filter: blur(16px);
    }

    .search-input::placeholder { color: var(--muted); }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .search-btn {
      background: var(--accent);
      border: none;
      border-radius: 14px;
      padding: 14px 22px;
      color: #fff;
      font-size: 0.98rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      transition: background 0.18s, box-shadow 0.18s, transform 0.1s;
    }

    .search-btn:hover { background: #7a72ff; box-shadow: 0 4px 20px var(--accent-glow); }
    .search-btn:active { transform: scale(0.97); }
    .search-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .spinner.on { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      display: none;
      width: 100%;
      background: rgba(255, 70, 70, 0.1);
      border: 1px solid rgba(255, 70, 70, 0.28);
      border-radius: 14px;
      padding: 13px 18px;
      color: #ff8888;
      font-size: 0.9rem;
      text-align: center;
      margin-bottom: 20px;
      animation: fadeUp 0.3s ease;
    }

    .error-box.on { display: block; }

    .weather-card {
      display: none;
      flex-direction: column;
      gap: 22px;
      width: 100%;
      border-radius: 26px;
      padding: 34px 30px;
      animation: fadeUp 0.4s ease;
    }

    .weather-card.on { display: flex; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .city-info { display: flex; flex-direction: column; gap: 3px; }

    .city-name {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.05;
    }

    .city-country {
      font-size: 0.85rem;
      color: var(--secondary);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .city-time {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--secondary);
      margin-top: 7px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .city-time svg { flex-shrink: 0; }

    .weather-icon-box {
      background: linear-gradient(140deg, rgba(108,99,255,0.18), rgba(99,180,255,0.08));
      border: 1px solid rgba(108,99,255,0.22);
      border-radius: 20px;
      width: 84px;
      height: 84px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .weather-icon-box img {
      width: 64px;
      height: 64px;
      filter: drop-shadow(0 2px 10px rgba(108,99,255,0.45));
    }

    .rule { height: 1px; background: var(--glass-border); }

    .temp-row {
      display: flex;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 10px 18px;
    }

    .temp-block { display: flex; align-items: flex-end; gap: 2px; line-height: 1; }

    .temp-value {
      font-size: 4.8rem;
      font-weight: 800;
      letter-spacing: -4px;
      background: linear-gradient(140deg, #f2f2ff, #9898c8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .temp-unit {
      font-size: 4.8rem;
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
      background: linear-gradient(140deg, #f2f2ff, #9898c8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .temp-sep {
      font-size: 1.6rem;
      font-weight: 300;
      color: var(--muted);
      align-self: center;
      padding-bottom: 6px;
    }

    .weather-desc {
      font-size: 1rem;
      color: var(--secondary);
      text-transform: capitalize;
      letter-spacing: 0.02em;
      align-self: center;
      padding-bottom: 6px;
    }

    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .stat-card {
      border-radius: 18px;
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .stat-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-label svg { flex-shrink: 0; }

    .stat-value {
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.5px;
    }

    .stat-sub { font-size: 0.72rem; color: var(--muted); }

    .app-footer {
      margin-top: 20px;
      font-size: 0.72rem;
      color: rgba(200, 200, 225, 0.4);
      letter-spacing: 0.05em;
      text-shadow: 0 1px 5px rgba(0,0,0,0.7);
    }

    /* ════════════════════════════
       MOBILE  ≤ 639px
    ════════════════════════════ */
    @media (max-width: 639px) {
      body {
        flex-direction: column;
        align-items: stretch;
        padding: 20px 14px 28px;
        gap: 16px;
      }

      /* Stack: main on top, sidebar at bottom */
      .main    { order: 1; width: 100%; max-width: none; }
      .sidebar { order: 2; width: 100%; position: static; border-radius: 20px; }

      /* Title */
      .app-title { font-size: 1.05rem; margin-bottom: 16px; gap: 8px; }

      /* Search bar — full-width, touch-friendly */
      .search-bar   { margin-bottom: 14px; }
      .search-input { padding: 13px 15px; font-size: 1rem; border-radius: 12px; }
      .search-btn   { padding: 13px 16px; font-size: 0.9rem; gap: 6px; border-radius: 12px; }

      /* Weather card */
      .weather-card { padding: 20px 16px; gap: 16px; border-radius: 20px; }

      /* Card header */
      .city-name        { font-size: 1.55rem; }
      .city-time        { font-size: 0.88rem; margin-top: 5px; }
      .weather-icon-box { width: 64px; height: 64px; border-radius: 15px; }
      .weather-icon-box img { width: 48px; height: 48px; }

      /* Temperature — scale down to fit two blocks on one line */
      .temp-row   { gap: 5px 10px; }
      .temp-value { font-size: 3rem; letter-spacing: -2px; }
      .temp-unit  { font-size: 3rem; letter-spacing: -1px; }
      .temp-sep   { font-size: 1.1rem; padding-bottom: 4px; }
      .weather-desc { font-size: 0.9rem; width: 100%; padding-bottom: 0; }

      /* Stats */
      .stat-card  { padding: 12px 14px; border-radius: 14px; gap: 5px; }
      .stat-value { font-size: 1.3rem; }
      .stat-sub   { font-size: 0.68rem; }

      /* Error */
      .error-box { font-size: 0.85rem; padding: 11px 14px; border-radius: 12px; }

      /* ── Sidebar: horizontal scrollable city strip ── */
      .sidebar-title { margin-bottom: 0; }

      .city-list {
        flex-direction: row;
        overflow-x: auto;
        overflow-y: visible;
        gap: 8px;
        padding-bottom: 4px;
        scrollbar-width: none;
      }
      .city-list::-webkit-scrollbar { display: none; }

      .city-item    { flex-shrink: 0; align-items: center; gap: 5px; }

      .city-flag-btn {
        width: 118px;
        flex: none;
        height: 54px;
        border-radius: 14px;
      }

      .city-remove  { width: 30px; height: 30px; border-radius: 9px; flex-shrink: 0; }

      /* Add city row */
      .add-city-input { padding: 11px 12px; font-size: 0.9rem; border-radius: 11px; }
      .add-city-btn   { width: 42px; height: 42px; border-radius: 11px; font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar glass">
    <div class="sidebar-title">Quick Cities</div>
    <div class="city-list" id="cityList"></div>
    <div class="sidebar-divider"></div>
    <div class="add-city-row">
      <input class="add-city-input" id="addInput" type="text" placeholder="Add city…" autocomplete="off" spellcheck="false" />
      <button class="add-city-btn" id="addBtn">+</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <h1 class="app-title">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17.5 19a4.5 4.5 0 1 0 0-9H17A7 7 0 1 0 5 15.5"/>
        <path d="M9 19v3M12 19v3M15 19v3"/>
      </svg>
      Weather Now
    </h1>

    <div class="search-bar">
      <input class="search-input" id="searchInput" type="text" placeholder="Search for a city…" autocomplete="off" spellcheck="false" />
      <button class="search-btn" id="searchBtn">
        <span id="btnLabel">Search</span>
        <div class="spinner" id="spinner"></div>
        <svg id="searchIcon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
        </svg>
      </button>
    </div>

    <div class="error-box" id="errorBox"></div>

    <div class="weather-card glass" id="weatherCard">
      <div class="card-header">
        <div class="city-info">
          <div class="city-name"    id="wCity"></div>
          <div class="city-country" id="wCountry"></div>
          <div class="city-time"    id="wTime"></div>
        </div>
        <div class="weather-icon-box">
          <img id="wIcon" src="" alt="" />
        </div>
      </div>

      <div class="rule"></div>

      <div class="temp-row">
        <div class="temp-block">
          <span class="temp-value" id="wTempC"></span>
          <span class="temp-unit">°C</span>
        </div>
        <span class="temp-sep">/</span>
        <div class="temp-block">
          <span class="temp-value" id="wTempF"></span>
          <span class="temp-unit">°F</span>
        </div>
        <span class="weather-desc" id="wDesc"></span>
      </div>

      <div class="stats">
        <div class="stat-card glass">
          <div class="stat-label">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 12v-4m0 4 3 3"/>
            </svg>
            Humidity
          </div>
          <div class="stat-value" id="wHumidity"></div>
          <div class="stat-sub">Relative humidity</div>
        </div>
        <div class="stat-card glass">
          <div class="stat-label">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/>
            </svg>
            Wind Speed
          </div>
          <div class="stat-value" id="wWind"></div>
          <div class="stat-sub">Metres per second</div>
        </div>
      </div>
    </div>

    <footer class="app-footer">Powered by OpenWeatherMap</footer>
  </main>

  <script>
    const API_KEY = 'bd9327a93b1bf0eb44cb95575bb44384';

    const searchInput = document.getElementById('searchInput');
    const searchBtn   = document.getElementById('searchBtn');
    const btnLabel    = document.getElementById('btnLabel');
    const spinner     = document.getElementById('spinner');
    const searchIcon  = document.getElementById('searchIcon');
    const errorBox    = document.getElementById('errorBox');
    const weatherCard = document.getElementById('weatherCard');

    searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') fetchWeather(); });
    document.getElementById('searchBtn').addEventListener('click', fetchWeather);

    function setLoading(on) {
      searchBtn.disabled = on;
      spinner.classList.toggle('on', on);
      searchIcon.style.display = on ? 'none' : '';
      btnLabel.textContent = on ? '' : 'Search';
    }

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.classList.add('on');
      weatherCard.classList.remove('on');
    }

    function hideError() { errorBox.classList.remove('on'); }

    // ── Clock ──
    let clockInterval = null, tzOffset = 0, sunriseTs = 0, sunsetTs = 0;

    const SUN  = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#f5c030" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>`;
    const MOON = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8aaad4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;

    function startClock(offset, rise, set) {
      tzOffset = offset; sunriseTs = rise; sunsetTs = set;
      if (clockInterval) clearInterval(clockInterval);
      tickClock();
      clockInterval = setInterval(tickClock, 1000);
    }

    function tickClock() {
      const now    = new Date();
      const utcMs  = now.getTime() + now.getTimezoneOffset() * 60000;
      const local  = new Date(utcMs + tzOffset * 1000);
      const h      = local.getHours();
      const m      = String(local.getMinutes()).padStart(2, '0');
      const ampm   = h >= 12 ? 'PM' : 'AM';
      const h12    = h % 12 || 12;
      const isDay  = Math.floor(now.getTime() / 1000) >= sunriseTs &&
                     Math.floor(now.getTime() / 1000) <= sunsetTs;
      document.getElementById('wTime').innerHTML = `${isDay ? SUN : MOON} ${h12}:${m} ${ampm}`;
    }

    // ── Weather ──
    async function fetchWeather(cityOverride) {
      const city = (typeof cityOverride === 'string' ? cityOverride : searchInput.value).trim();
      if (!city) { searchInput.focus(); return; }
      hideError();
      setLoading(true);
      try {
        const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`);
        if (res.status === 404) { showError(`City "${city}" not found — check the spelling and try again.`); return; }
        if (!res.ok)            { showError('Unable to fetch weather data. Please try again.'); return; }
        render(await res.json());
      } catch {
        showError('Network error — check your connection and try again.');
      } finally {
        setLoading(false);
      }
    }

    function render(d) {
      document.getElementById('wCity').textContent     = d.name;
      document.getElementById('wCountry').textContent  = d.sys.country;
      document.getElementById('wTempC').textContent    = Math.round(d.main.temp);
      document.getElementById('wTempF').textContent    = Math.round(d.main.temp * 9 / 5 + 32);
      document.getElementById('wDesc').textContent     = d.weather[0].description;
      document.getElementById('wHumidity').textContent = d.main.humidity + '%';
      document.getElementById('wWind').textContent     = d.wind.speed.toFixed(1) + ' m/s';
      const img = document.getElementById('wIcon');
      img.src = `https://openweathermap.org/img/wn/${d.weather[0].icon}@2x.png`;
      img.alt = d.weather[0].description;
      startClock(d.timezone, d.sys.sunrise, d.sys.sunset);
      weatherCard.classList.add('on');
    }

    // ── Quick cities ──
    let cities = JSON.parse(localStorage.getItem('qc2') || '[]');

    const _cv = document.createElement('canvas');
    function fitText(text, maxPx) {
      const ctx = _cv.getContext('2d');
      let s = 18;
      ctx.font = `900 ${s}px 'Segoe UI', system-ui, sans-serif`;
      while (ctx.measureText(text).width > maxPx && s > 8) {
        s -= 0.5;
        ctx.font = `900 ${s}px 'Segoe UI', system-ui, sans-serif`;
      }
      return s + 'px';
    }

    function renderCities() {
      const list = document.getElementById('cityList');
      if (!cities.length) {
        list.innerHTML = '<div class="city-empty">No cities saved yet</div>';
        return;
      }
      list.innerHTML = cities.map((c, i) => `
        <div class="city-item">
          <button class="city-flag-btn"
            style="background-image:url('https://flagcdn.com/w320/${c.country.toLowerCase()}.png')"
            onclick="quickLoad(${i})" title="${c.name}">
            <span class="city-label">${c.name}</span>
          </button>
          <button class="city-remove" onclick="removeCity(${i})" title="Remove">×</button>
        </div>`).join('');

      requestAnimationFrame(() => {
        list.querySelectorAll('.city-flag-btn').forEach(btn => {
          const span = btn.querySelector('.city-label');
          const max  = btn.clientWidth - 20;
          if (max > 0) span.style.fontSize = fitText(span.textContent, max);
        });
      });
    }

    function quickLoad(i) {
      searchInput.value = cities[i].name;
      fetchWeather(cities[i].name);
    }

    async function addCity() {
      const val = document.getElementById('addInput').value.trim();
      if (!val) return;
      if (cities.some(c => c.name.toLowerCase() === val.toLowerCase())) {
        document.getElementById('addInput').value = '';
        return;
      }
      try {
        const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(val)}&appid=${API_KEY}&units=metric`);
        if (!res.ok) return;
        const d = await res.json();
        cities.push({ name: d.name, country: d.sys.country });
        localStorage.setItem('qc2', JSON.stringify(cities));
        renderCities();
        document.getElementById('addInput').value = '';
      } catch { /* ignore */ }
    }

    function removeCity(i) {
      cities.splice(i, 1);
      localStorage.setItem('qc2', JSON.stringify(cities));
      renderCities();
    }

    document.getElementById('addBtn').addEventListener('click', addCity);
    document.getElementById('addInput').addEventListener('keydown', e => { if (e.key === 'Enter') addCity(); });

    renderCities();

    // ── Service worker ──
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
