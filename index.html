<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --card: rgba(15, 15, 25, 0.55);
      --card-border: rgba(255, 255, 255, 0.12);
      --accent: #6c63ff;
      --accent-glow: rgba(108, 99, 255, 0.35);
      --text-primary: #f0f0f8;
      --text-secondary: rgba(210, 210, 230, 0.8);
      --text-muted: rgba(180, 180, 210, 0.5);
      --input-bg: rgba(10, 10, 20, 0.55);
      --stat-bg: rgba(10, 10, 20, 0.45);
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: center;
      gap: 28px;
      padding: 60px 24px;
      background: #0f0f13;
    }

    body::before {
      content: '';
      position: fixed;
      inset: -20px;
      background:
        url('file:///C:/Users/johan/OneDrive/Skrivbord/DEMO%20Claude/weather-background.jpg') center center / cover no-repeat;
      z-index: -2;
      filter: blur(14px) brightness(0.85) saturate(1.2);
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(
        160deg,
        rgba(5, 5, 18, 0.55) 0%,
        rgba(10, 10, 30, 0.45) 50%,
        rgba(5, 5, 18, 0.65) 100%
      );
      z-index: -1;
    }

    /* ── Quick cities sidebar ── */
    .quick-cities {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      width: 230px;
      flex-shrink: 0;
      padding: 22px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      position: sticky;
      top: 60px;
    }

    .qc-title {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      color: var(--text-muted);
      padding-bottom: 10px;
      border-bottom: 1px solid var(--card-border);
    }

    .qc-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .qc-empty {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-align: center;
      padding: 8px 0;
    }

    .qc-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .qc-city-btn {
      flex: 1;
      border: none;
      border-radius: 20px;
      height: 64px;
      cursor: pointer;
      overflow: hidden;
      background-size: cover;
      background-position: center;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 5px 16px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(255,255,255,0.25),
        inset 0 -3px 6px rgba(0,0,0,0.35);
      transition: transform 0.12s, box-shadow 0.2s;
    }

    .qc-city-btn:hover {
      transform: scale(1.03);
      box-shadow:
        0 8px 24px rgba(0,0,0,0.65),
        inset 0 1px 0 rgba(255,255,255,0.25),
        inset 0 -3px 6px rgba(0,0,0,0.35);
    }

    .qc-city-name {
      font-weight: 900;
      color: #fff;
      text-align: center;
      text-shadow: 0 2px 8px rgba(0,0,0,0.9), 0 0 20px rgba(0,0,0,0.7);
      letter-spacing: 0.01em;
      white-space: nowrap;
      overflow: hidden;
      padding: 0 10px;
      width: 100%;
      pointer-events: none;
    }

    .qc-city-btn:hover {
      background: rgba(108, 99, 255, 0.15);
      border-color: rgba(108, 99, 255, 0.4);
      box-shadow: none;
    }

    .qc-city-btn:active {
      transform: scale(0.97);
    }

    .qc-remove {
      flex-shrink: 0;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 1rem;
      cursor: pointer;
      padding: 5px 7px;
      border-radius: 7px;
      line-height: 1;
      transition: color 0.2s, background 0.2s;
      box-shadow: none;
    }

    .qc-remove:hover {
      color: #ff8080;
      background: rgba(255, 80, 80, 0.12);
      box-shadow: none;
    }

    .qc-divider {
      height: 1px;
      background: var(--card-border);
    }

    .qc-add {
      display: flex;
      gap: 6px;
    }

    .qc-add input {
      flex: 1;
      padding: 9px 10px;
      font-size: 0.85rem;
      border-radius: 10px;
      min-width: 0;
    }

    .qc-add-btn {
      flex-shrink: 0;
      padding: 9px 13px;
      border-radius: 10px;
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1;
    }

    /* ── Main content ── */
    .main-content {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(220, 220, 240, 0.9);
      text-shadow: 0 2px 12px rgba(0,0,0,0.7);
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 svg {
      opacity: 0.7;
    }

    .search-wrapper {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 600px;
      margin-bottom: 28px;
    }

    input {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 14px 18px;
      color: var(--text-primary);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    input::placeholder {
      color: var(--text-muted);
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    button {
      background: var(--accent);
      border: none;
      border-radius: 12px;
      padding: 14px 20px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    button:hover {
      background: #7a72ff;
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    button:active {
      transform: scale(0.97);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      width: 100%;
      max-width: 600px;
      padding: 36px 32px;
      display: none;
      flex-direction: column;
      gap: 24px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      animation: fadeIn 0.4s ease;
    }

    .card.visible {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .location {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .city-name {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    .country {
      font-size: 0.9rem;
      color: var(--text-secondary);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .local-time {
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.02em;
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .local-time svg { flex-shrink: 0; }

    .weather-icon-wrapper {
      background: linear-gradient(135deg, rgba(108,99,255,0.15), rgba(99,179,255,0.08));
      border: 1px solid rgba(108,99,255,0.2);
      border-radius: 20px;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .weather-icon-wrapper img {
      width: 60px;
      height: 60px;
      filter: drop-shadow(0 2px 8px rgba(108,99,255,0.4));
    }

    .divider {
      height: 1px;
      background: var(--card-border);
    }

    .temp-row {
      display: flex;
      align-items: flex-end;
      gap: 16px;
    }

    .temp {
      font-size: 4.5rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -3px;
      background: linear-gradient(135deg, #f0f0f8, #a0a0c8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .temp-unit {
      font-size: 4.5rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -3px;
      background: linear-gradient(135deg, #f0f0f8, #a0a0c8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .description {
      font-size: 1.05rem;
      color: var(--text-secondary);
      text-transform: capitalize;
      letter-spacing: 0.02em;
      margin-top: auto;
      margin-bottom: 4px;
      padding-bottom: 2px;
    }

    .temp-f {
      font-size: 4.5rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -3px;
      white-space: nowrap;
      background: linear-gradient(135deg, #f0f0f8, #a0a0c8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat {
      background: var(--stat-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .stat-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-label svg {
      flex-shrink: 0;
    }

    .stat-value {
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .stat-sub {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .error-msg {
      display: none;
      background: rgba(255, 80, 80, 0.1);
      border: 1px solid rgba(255, 80, 80, 0.25);
      border-radius: 12px;
      padding: 14px 18px;
      color: #ff8080;
      font-size: 0.9rem;
      width: 100%;
      max-width: 600px;
      text-align: center;
    }

    .error-msg.visible {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    .spinner {
      display: none;
      width: 22px;
      height: 22px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .spinner.visible {
      display: inline-block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .btn-text { display: inline; }

    footer {
      margin-top: 24px;
      font-size: 0.75rem;
      color: rgba(200, 200, 220, 0.55);
      letter-spacing: 0.04em;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    }
  </style>
</head>
<body>

  <!-- Quick cities sidebar -->
  <aside class="quick-cities">
    <div class="qc-title">Quick Cities</div>
    <div class="qc-list" id="qcList"></div>
    <div class="qc-divider"></div>
    <div class="qc-add">
      <input type="text" id="qcInput" placeholder="Add city..." autocomplete="off" spellcheck="false" />
      <button class="qc-add-btn" onclick="addQuickCity()" title="Add city">+</button>
    </div>
  </aside>

  <!-- Main content -->
  <div class="main-content">
    <h1>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17.5 19a4.5 4.5 0 1 0 0-9H17A7 7 0 1 0 5 15.5"/>
        <path d="M9 19v3M12 19v3M15 19v3"/>
      </svg>
      Weather Now
    </h1>

    <div class="search-wrapper">
      <input
        type="text"
        id="cityInput"
        placeholder="Enter city name..."
        autocomplete="off"
        spellcheck="false"
      />
      <button id="searchBtn" onclick="fetchWeather()">
        <span class="btn-text">Search</span>
        <div class="spinner" id="spinner"></div>
        <svg id="searchIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
        </svg>
      </button>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="card" id="weatherCard">
      <div class="card-top">
        <div class="location">
          <div class="city-name" id="cityDisplay"></div>
          <div class="country" id="countryDisplay"></div>
          <div class="local-time" id="timeDisplay"></div>
        </div>
        <div class="weather-icon-wrapper">
          <img id="weatherIcon" src="" alt="weather icon" />
        </div>
      </div>

      <div class="divider"></div>

      <div class="temp-row">
        <div class="temp" id="tempDisplay"></div>
        <div class="temp-unit">°C</div>
        <div class="description" id="descDisplay"></div>
        <div class="temp-f" id="tempFDisplay"></div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-label">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 12v-4m0 4 3 3"/>
            </svg>
            Humidity
          </div>
          <div class="stat-value" id="humidityDisplay"></div>
          <div class="stat-sub">Relative humidity</div>
        </div>
        <div class="stat">
          <div class="stat-label">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/>
            </svg>
            Wind Speed
          </div>
          <div class="stat-value" id="windDisplay"></div>
          <div class="stat-sub">Metres per second</div>
        </div>
      </div>
    </div>

    <footer>Powered by OpenWeatherMap</footer>
  </div>

  <script>
    const API_KEY = 'bd9327a93b1bf0eb44cb95575bb44384';

    const input     = document.getElementById('cityInput');
    const btn       = document.getElementById('searchBtn');
    const spinner   = document.getElementById('spinner');
    const searchIcon = document.getElementById('searchIcon');
    const card      = document.getElementById('weatherCard');
    const errMsg    = document.getElementById('errorMsg');

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') fetchWeather();
    });

    // ── Quick cities ──
    let quickCities = JSON.parse(localStorage.getItem('quickCities') || '[]');
    // Migrate old string format
    if (quickCities.length > 0 && typeof quickCities[0] === 'string') {
      quickCities = [];
      localStorage.removeItem('quickCities');
    }

    const _canvas = document.createElement('canvas');
    function fitFontSize(text, maxPx, maxSize = 18, minSize = 9) {
      const ctx = _canvas.getContext('2d');
      let size = maxSize;
      ctx.font = `900 ${size}px 'Segoe UI', system-ui, sans-serif`;
      while (ctx.measureText(text).width > maxPx && size > minSize) {
        size -= 0.5;
        ctx.font = `900 ${size}px 'Segoe UI', system-ui, sans-serif`;
      }
      return size + 'px';
    }

    function renderQuickCities() {
      const list = document.getElementById('qcList');
      if (quickCities.length === 0) {
        list.innerHTML = '<div class="qc-empty">No cities yet</div>';
        return;
      }
      list.innerHTML = quickCities.map((city, i) => `
        <div class="qc-item">
          <button class="qc-city-btn" onclick="searchQuickCity(${i})"
            style="background-image:url('https://flagcdn.com/w320/${city.country.toLowerCase()}.png')"
            title="${city.name}">
            <span class="qc-city-name">${city.name}</span>
          </button>
          <button class="qc-remove" onclick="removeQuickCity(${i})" title="Remove">×</button>
        </div>
      `).join('');

      requestAnimationFrame(() => {
        list.querySelectorAll('.qc-city-btn').forEach(btn => {
          const span = btn.querySelector('.qc-city-name');
          const maxWidth = btn.clientWidth - 20;
          if (maxWidth > 0) span.style.fontSize = fitFontSize(span.textContent, maxWidth);
        });
      });
    }

    function searchQuickCity(index) {
      input.value = quickCities[index].name;
      fetchWeather();
    }

    async function addQuickCity() {
      const val = document.getElementById('qcInput').value.trim();
      if (!val) return;
      if (quickCities.some(c => c.name.toLowerCase() === val.toLowerCase())) {
        document.getElementById('qcInput').value = '';
        return;
      }
      try {
        const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(val)}&appid=${API_KEY}&units=metric`);
        if (!res.ok) return;
        const data = await res.json();
        quickCities.push({ name: data.name, country: data.sys.country });
        localStorage.setItem('quickCities', JSON.stringify(quickCities));
        renderQuickCities();
        document.getElementById('qcInput').value = '';
      } catch (e) { /* ignore */ }
    }

    function removeQuickCity(index) {
      quickCities.splice(index, 1);
      localStorage.setItem('quickCities', JSON.stringify(quickCities));
      renderQuickCities();
    }

    document.getElementById('qcInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addQuickCity();
    });

    renderQuickCities();

    // ── City local clock ──
    let clockInterval = null;
    let cityTimezoneOffset = null;
    let citySunrise = null;
    let citySunset = null;

    const SUN_SVG  = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f5c542" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>`;
    const MOON_SVG = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a0b4d8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;

    function startClock(timezoneOffset, sunrise, sunset) {
      cityTimezoneOffset = timezoneOffset;
      citySunrise = sunrise;
      citySunset  = sunset;
      if (clockInterval) clearInterval(clockInterval);
      updateClock();
      clockInterval = setInterval(updateClock, 1000);
    }

    function updateClock() {
      const now   = new Date();
      const utcMs = now.getTime() + now.getTimezoneOffset() * 60000;
      const cityTime = new Date(utcMs + cityTimezoneOffset * 1000);
      const h    = cityTime.getHours();
      const m    = String(cityTime.getMinutes()).padStart(2, '0');
      const ampm = h >= 12 ? 'PM' : 'AM';
      const h12  = h % 12 || 12;

      const utcSec = Math.floor(now.getTime() / 1000);
      const isDay  = utcSec >= citySunrise && utcSec <= citySunset;

      document.getElementById('timeDisplay').innerHTML = `${isDay ? SUN_SVG : MOON_SVG} ${h12}:${m} ${ampm}`;
    }

    // ── Weather fetch ──
    function setLoading(on) {
      btn.disabled = on;
      spinner.classList.toggle('visible', on);
      searchIcon.style.display = on ? 'none' : '';
    }

    function showError(msg) {
      errMsg.textContent = msg;
      errMsg.classList.add('visible');
      card.classList.remove('visible');
    }

    function hideError() {
      errMsg.classList.remove('visible');
    }

    async function fetchWeather() {
      const city = input.value.trim();
      if (!city) {
        input.focus();
        return;
      }

      hideError();
      setLoading(true);

      try {
        const url = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`;
        const res = await fetch(url);

        if (res.status === 404) {
          showError(`City "${city}" not found. Please check the spelling and try again.`);
          return;
        }
        if (!res.ok) {
          showError('Unable to fetch weather data. Please try again later.');
          return;
        }

        const data = await res.json();
        renderWeather(data);
      } catch (err) {
        showError('Network error. Please check your connection and try again.');
      } finally {
        setLoading(false);
      }
    }

    function renderWeather(data) {
      document.getElementById('cityDisplay').textContent     = data.name;
      document.getElementById('countryDisplay').textContent  = data.sys.country;
      document.getElementById('tempDisplay').textContent     = Math.round(data.main.temp);
      document.getElementById('descDisplay').textContent     = data.weather[0].description;
      document.getElementById('humidityDisplay').textContent = data.main.humidity + '%';
      document.getElementById('windDisplay').textContent     = data.wind.speed.toFixed(1) + ' m/s';

      const tempF = Math.round(data.main.temp * 9 / 5 + 32);
      document.getElementById('tempFDisplay').textContent = tempF + ' °F';

      const iconCode = data.weather[0].icon;
      document.getElementById('weatherIcon').src = `https://openweathermap.org/img/wn/${iconCode}@2x.png`;
      document.getElementById('weatherIcon').alt = data.weather[0].description;

      startClock(data.timezone, data.sys.sunrise, data.sys.sunset);
      card.classList.add('visible');
    }
  </script>
</body>
</html>
